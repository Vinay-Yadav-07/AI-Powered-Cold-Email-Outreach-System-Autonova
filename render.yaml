services:
  - type: web
    name: autonova-dashboard
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: N8N_WEBHOOK_URL
        value: https://n8n.autonovalabs.dev/webhook/lead/add
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
